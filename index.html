<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>

    <form id="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="Ajouter une tâche..."
        autocomplete="off"
        required
      />
      <button type="submit">Ajouter</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="active">À faire</button>
      <button class="filter-btn" data-filter="completed">Terminées</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="footer">
      <span id="items-left">0 tâche(s) restante(s)</span>
      <button id="clear-completed">Supprimer terminées</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
