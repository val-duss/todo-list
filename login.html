<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List — Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>Todo List</h1>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Connexion</button>
      <button class="auth-tab" data-tab="register">Inscription</button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="auth-form">
      <input class="auth-input" type="text" id="login-username" placeholder="Nom d'utilisateur" autocomplete="username" required />
      <input class="auth-input" type="password" id="login-password" placeholder="Mot de passe" autocomplete="current-password" required />
      <p class="auth-error" id="login-error"></p>
      <button class="auth-submit" type="submit">Se connecter</button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="auth-form" hidden>
      <input class="auth-input" type="text" id="reg-username" placeholder="Nom d'utilisateur (min. 3 car.)" autocomplete="username" required />
      <input class="auth-input" type="password" id="reg-password" placeholder="Mot de passe (min. 6 car.)" autocomplete="new-password" required />
      <input class="auth-input" type="password" id="reg-confirm" placeholder="Confirmer le mot de passe" autocomplete="new-password" required />
      <p class="auth-error" id="register-error"></p>
      <button class="auth-submit" type="submit">Créer un compte</button>
    </form>
  </div>

  <script src="config.js"></script>
  <script src="login.js"></script>
</body>
</html>
