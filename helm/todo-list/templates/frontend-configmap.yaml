apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todo-list.fullname" . }}-frontend
  labels:
    {{- include "todo-list.labels" . | nindent 4 }}
data:
  config.js: |
    const API_URL = '{{ .Values.frontend.apiUrl }}';
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
